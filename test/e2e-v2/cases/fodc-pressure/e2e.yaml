# FODC memory-pressure pprof e2e: a real 1:1 BanyanDB liaison/data cluster (each
# node has a cgroup memory limit, so banyandb_memory_protector_cgroup_limit_bytes is
# non-zero), a fodc-agent sidecar per node with the pressure profiler enabled at
# trigger-percent=1 (any RSS above 1% of the limit captures), and a fodc-proxy.
# No OAP/load apps are needed: the trigger fires on memory usage, not traffic.
# It reuses the shared manifests under cases/fodc/. check-pressure.sh verifies the
# full chain: real capture on disk -> proxy list metadata -> proxy stream-download
# -> the downloaded bytes parse as a valid pprof.

setup:
  env: kind
  file: ../fodc/kind.yaml
  timeout: 20m
  init-system-environment: ../../script/env
  kind:
    import-images:
      - apache/skywalking-banyandb:latest
      - apache/skywalking-banyandb-fodc-agent:latest
      - apache/skywalking-banyandb-fodc-proxy:latest
    expose-ports:
      - namespace: default
        resource: service/fodc-proxy
        port: 17913
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install kubectl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh kubectl
    - name: Deploy FODC proxy
      command: kubectl apply -f test/e2e-v2/cases/fodc/fodc-proxy.yaml
    - name: Deploy standalone BanyanDB with FODC agent sidecar
      command: kubectl apply -f test/e2e-v2/cases/fodc-pressure/banyandb-cluster.yaml
    - name: Wait for all workloads to be ready
      command: |
        kubectl rollout status deployment/fodc-proxy --timeout=180s
        kubectl rollout status deployment/banyandb-standalone --timeout=300s
  wait:
    - namespace: default
      resource: deployment/fodc-proxy
      for: condition=available
    - namespace: default
      resource: deployment/banyandb-standalone
      for: condition=available

verify:
  retry:
    count: 20
    interval: 10s
  cases:
    - query: bash test/e2e-v2/cases/fodc-pressure/check-pressure.sh
      expected: expected/pressure-status.yml
