# FODC dashboard-metrics e2e: a 1:1 BanyanDB liaison/data cluster, a fodc-agent
# sidecar per node, and a fodc-proxy, behind a real SkyWalking OAP fed by the
# provider/consumer demo apps. Verifies that every metric consumed by the FODC
# Grafana dashboards is exported (and the always-on core is non-empty) on the
# fodc-proxy /metrics endpoint. Modeled on
# test/e2e-v2/cases/rover/process/istio/banyandb/e2e-banyandb.yaml (env: kind)
# and test/e2e-v2/cases/cluster/e2e.yaml (consumer/producer trigger).

setup:
  env: kind
  file: kind.yaml
  timeout: 25m
  init-system-environment: ../../script/env
  kind:
    import-images:
      - apache/skywalking-banyandb:latest
      - apache/skywalking-banyandb-fodc-agent:latest
      - apache/skywalking-banyandb-fodc-proxy:latest
    expose-ports:
      - namespace: default
        resource: service/oap
        port: 12800
      - namespace: default
        resource: service/consumer
        port: 9092
  steps:
    - name: set PATH
      command: export PATH=/tmp/skywalking-infra-e2e/bin:$PATH
    - name: install yq
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh yq
    - name: install swctl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh swctl
    - name: install kubectl
      command: bash test/e2e-v2/script/prepare/setup-e2e-shell/install.sh kubectl
    - name: Create BanyanDB node-discovery ConfigMap
      command: |
        kubectl create configmap banyandb-nodes \
          --from-file=nodes.yaml=test/e2e-v2/cases/fodc/nodes.yaml
    - name: Deploy FODC proxy
      command: kubectl apply -f test/e2e-v2/cases/fodc/fodc-proxy.yaml
    - name: Deploy BanyanDB cluster with FODC agent sidecars
      command: kubectl apply -f test/e2e-v2/cases/fodc/banyandb-cluster.yaml
    - name: Deploy SkyWalking OAP
      command: envsubst < test/e2e-v2/cases/fodc/oap.yaml | kubectl apply -f -
    - name: Deploy provider and consumer demo apps
      command: envsubst < test/e2e-v2/cases/fodc/provider-consumer.yaml | kubectl apply -f -
    - name: Wait for all workloads to be ready
      # Block here so the kind expose-ports port-forward (set up right after the
      # setup steps, before the wait: conditions) targets already-running pods.
      command: |
        kubectl rollout status deployment/fodc-proxy --timeout=180s
        kubectl rollout status deployment/banyandb-liaison --timeout=300s
        kubectl rollout status deployment/banyandb-data --timeout=300s
        kubectl rollout status deployment/oap --timeout=600s
        kubectl rollout status deployment/provider --timeout=600s
        kubectl rollout status deployment/consumer --timeout=600s
  wait:
    - namespace: default
      resource: deployment/fodc-proxy
      for: condition=available
    - namespace: default
      resource: deployment/banyandb-liaison
      for: condition=available
    - namespace: default
      resource: deployment/banyandb-data
      for: condition=available
    - namespace: default
      resource: deployment/oap
      for: condition=available
    - namespace: default
      resource: deployment/provider
      for: condition=available
    - namespace: default
      resource: deployment/consumer
      for: condition=available

trigger:
  action: http
  interval: 5s
  times: -1
  url: http://${service_consumer_host}:${service_consumer_9092}/users
  method: POST
  body: '{"id":"123","name":"skywalking"}'
  headers:
    "Content-Type": "application/json"

verify:
  retry:
    count: 40
    interval: 10s
  cases:
    # 1) Validates the OAP -> BanyanDB write+query path and primes
    #    operation="query" load (service metadata is read from the BanyanDB
    #    service_traffic measure on the liaison->data query path).
    - query: swctl --display yaml --base-url=http://${service_oap_host}:${service_oap_12800}/graphql service ls
      expected: expected/service.yml
    # 2) Asserts the FODC dashboard metrics on the fodc-proxy /metrics endpoint.
    - query: bash test/e2e-v2/cases/fodc/check-metrics.sh
      expected: expected/metrics-status.yml

cleanup:
  on: always
  collect:
    on: failure
    output-dir: $SW_INFRA_E2E_LOG_DIR/fodc-data
    items:
      - namespace: default
        label-selector: app=banyandb-data
        paths:
          - /tmp/trace/
          - /tmp/stream/
          - /tmp/measure/
          - /tmp/property/
