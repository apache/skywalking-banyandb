# FODC proxy: agents register and stream metrics to its gRPC :17912; it
# aggregates and serves the Prometheus exposition at http :17913/metrics and
# the cluster snapshot at /cluster/topology. Runs as its own pod so the
# 17912/17913 defaults do not collide with the banyandb nodes.
---
apiVersion: v1
kind: Service
metadata:
  name: fodc-proxy
  labels:
    app: fodc-proxy
spec:
  selector:
    app: fodc-proxy
  ports:
    - name: grpc
      port: 17912
      targetPort: 17912
    - name: http
      port: 17913
      targetPort: 17913
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fodc-proxy
  labels:
    app: fodc-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fodc-proxy
  template:
    metadata:
      labels:
        app: fodc-proxy
    spec:
      containers:
        - name: fodc-proxy
          image: apache/skywalking-banyandb-fodc-proxy:latest
          imagePullPolicy: IfNotPresent
          args:
            - --grpc-listen-addr=:17912
            - --http-listen-addr=:17913
            - --heartbeat-interval=5s
          ports:
            - { name: grpc, containerPort: 17912 }
            - { name: http, containerPort: 17913 }
          resources:
            limits:
              memory: 256Mi
              cpu: "500m"
            requests:
              memory: 64Mi
              cpu: "100m"
