# SkyWalking OAP backed by the BanyanDB cluster (targets the liaison). Applied
# through envsubst so ${SW_OAP_COMMIT} resolves from test/e2e-v2/script/env.
# gRPC 11800 receives agent traffic; 12800 serves the GraphQL/REST API used by
# swctl for query priming and verification.
---
apiVersion: v1
kind: Service
metadata:
  name: oap
  labels:
    app: oap
spec:
  selector:
    app: oap
  ports:
    - name: grpc
      port: 11800
      targetPort: 11800
    - name: rest
      port: 12800
      targetPort: 12800
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oap
  labels:
    app: oap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oap
  template:
    metadata:
      labels:
        app: oap
    spec:
      containers:
        - name: oap
          image: ghcr.io/apache/skywalking/oap:${SW_OAP_COMMIT}
          imagePullPolicy: IfNotPresent
          env:
            - name: SW_STORAGE
              value: banyandb
            - name: SW_STORAGE_BANYANDB_TARGETS
              value: "liaison:17912"
            - name: SW_STORAGE_BANYANDB_COMPATIBLE_SERVER_API_VERSIONS
              value: "0.10"
            - name: SW_HEALTH_CHECKER
              value: default
            - name: SW_TELEMETRY
              value: prometheus
          ports:
            - { name: grpc, containerPort: 11800 }
            - { name: rest, containerPort: 12800 }
          readinessProbe:
            tcpSocket:
              port: 12800
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: 11800
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
            requests:
              memory: 1Gi
              cpu: "500m"
