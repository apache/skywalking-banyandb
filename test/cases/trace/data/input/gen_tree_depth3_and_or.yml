criteria:
  le:
    left:
      le:
        left:
          condition:
            name: service_id
            op: BINARY_OP_EQ
            value:
              str:
                value: api_service
        op: LOGICAL_OP_OR
        right:
          condition:
            name: service_instance_id
            op: BINARY_OP_EQ
            value:
              str:
                value: api_instance_2
    op: LOGICAL_OP_AND
    right:
      le:
        left:
          condition:
            name: state
            op: BINARY_OP_EQ
            value:
              int: {}
        op: LOGICAL_OP_OR
        right:
          condition:
            name: service_id
            op: BINARY_OP_EQ
            value:
              str:
                value: notification_service
groups:
- test-trace-group
name: sw
orderBy:
  indexRuleName: timestamp
  sort: SORT_DESC
tagProjection:
- trace_id
- span_id
- service_id
- duration
