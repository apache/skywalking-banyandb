cluster:
  enabled: true
  liaison:
    replicas: 1
    env:
      - name: BYDB_SCHEMA_REGISTRY_MODE
        value: property
      - name: BYDB_NODE_DISCOVERY_MODE
        value: dns
      - name: BYDB_NODE_DISCOVERY_DNS_SRV_ADDRESSES
        value: _grpc._tcp.banyandb-bench-data-hot-headless.$(POD_NAMESPACE).svc.cluster.local,_internal-grpc._tcp.banyandb-bench-liaison-headless.$(POD_NAMESPACE).svc.cluster.local
  data:
    roles:
      hot:
        env:
          - name: BYDB_SCHEMA_REGISTRY_MODE
            value: property
          - name: BYDB_NODE_DISCOVERY_MODE
            value: dns
          - name: BYDB_NODE_DISCOVERY_DNS_SRV_ADDRESSES
            value: _grpc._tcp.banyandb-bench-data-hot-headless.$(POD_NAMESPACE).svc.cluster.local,_internal-grpc._tcp.banyandb-bench-liaison-headless.$(POD_NAMESPACE).svc.cluster.local
    nodeTemplate:
      replicas: 3
standalone:
  enabled: false
etcd:
  enabled: false
image:
  repository: apache/skywalking-banyandb
  tag: ""
  pullPolicy: Never
storage:
  data:
    enabled: true
    persistentVolumeClaims:
      - mountTargets: ["measure", "stream", "trace", "property", "schema-property"]
        nodeRole: hot
        claimName: hot-benchmark-data
        size: 2Gi
        accessModes:
          - ReadWriteOnce
        storageClass: null
        volumeMode: Filesystem
  liaison:
    enabled: true
    persistentVolumeClaims:
      - mountTargets: ["measure", "stream", "trace", "property"]
        claimName: liaison-data
        size: 1Gi
        accessModes:
          - ReadWriteOnce
        storageClass: null
        volumeMode: Filesystem
  standalone:
    enabled: false
