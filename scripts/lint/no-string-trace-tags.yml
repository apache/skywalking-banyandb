id: no-string-trace-tags
language: go
message: Use pkg/query/tracelabels constants for vectorized measure trace tag keys.
severity: error
files:
  - pkg/query/vectorized/measure/**/*.go
  - pkg/query/tracer.go
rule:
  any:
    - pattern: $SPAN.Tag("$KEY", $$$ARGS)
    - pattern: $SPAN.Tagf("$KEY", $$$ARGS)
ignores:
  - pkg/query/tracelabels/**
