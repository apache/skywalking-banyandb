header: # `header` section is configurations for source codes license header.
  license:
    spdx-id: Apache-2.0 # the spdx id of the license, it's convenient when your license is standard SPDX license.
    copyright-owner: Apache Software Foundation # the copyright owner to replace the [owner] in the `spdx-id` template.
    content: | # `license` will be used as the content when `fix` command needs to insert a license header.
      Licensed to Apache Software Foundation (ASF) under one or more contributor
      license agreements. See the NOTICE file distributed with
      this work for additional information regarding copyright
      ownership. Apache Software Foundation (ASF) licenses this file to you under
      the Apache License, Version 2.0 (the "License"); you may
      not use this file except in compliance with the License.
      You may obtain a copy of the License at

          http://www.apache.org/licenses/LICENSE-2.0

      Unless required by applicable law or agreed to in writing,
      software distributed under the License is distributed on an
      "AS IS" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY
      KIND, either express or implied.  See the License for the
      specific language governing permissions and limitations
      under the License.

    # `pattern` is optional regexp if all the file headers are the same as `license` or the license of `spdx-id` and `copyright-owner`.
    pattern: |
      Licensed to the Apache Software Foundation under one or more contributor
      license agreements. See the NOTICE file distributed with
      this work for additional information regarding copyright
      ownership. The Apache Software Foundation licenses this file to you under
      the Apache License, Version 2.0 \(the "License"\); you may
      not use this file except in compliance with the License.
      You may obtain a copy of the License at

          http://www.apache.org/licenses/LICENSE-2.0

      Unless required by applicable law or agreed to in writing,
      software distributed under the License is distributed on an
      "AS IS" BASIS, WITHOUT WARRANTIES OR CONDITIONS OF ANY
      KIND, either express or implied.  See the License for the
      specific language governing permissions and limitations
      under the License.

  paths: # `paths` are the path list that will be checked (and fixed) by license-eye, default is ['**'].
    - '**'

  paths-ignore: # `paths-ignore` are the path list that will be ignored by license-eye.
    - 'dist'
    - 'licenses'
    - '**/*.md'
    - '**/testdata/**'
    - '**/go.mod'
    - '**/go.sum'
    - 'LICENSE'
    - 'NOTICE'
    - '**/build/**'
    - '**/*.bin'
    - '**/*.json'
    - '**/*_mock.go'
    - '**/*_mock_test.go'
    - '**/*.pb.go'
    - '**/*.pb.validate.go'
    - '**/*.pb.gw.go'
    - '**/*.textproto'
    - '**/*.pem'
    - '**/.gitignore'
    - '**/buf.lock'
    - '**/ginkgo.report'
    - 'ui'
    # `canopy` removed — when the canopy subdir invokes license-eye with this
    # root config via --config, the canopy code IS the surface under check
    # (the canopy/.licenserc.yaml is no longer authoritative for the OMC
    # runtime state exclusions — those live here).
    - '**/*.jsonl'
    # OMC runtime state + uncommitted handoff / playwright artefacts. The
    # license-check target runs license-eye from each subdir with --config
    # pointing at this root file (so these patterns reach everything via
    # `**/`), and also when invoked directly from the repo root.
    - '**/agent-replay-*.jsonl'
    - '**/idle-notif-cooldown.json'
    - '**/pre-tool-advisory-throttle.json'
    - '**/ralplan-state.json'
    - '**/subagent-tracking-state.json'
    - '**/hud-stdin-cache.json'
    - '**/.handoff-import/**'
    - '**/.playwright-mcp/**'
    - '**/.gitkeep'
    - '**/.env'
    - '**/.env.example'
    - '**/.prettierignore'
    - '**/.eslintrc*'
    - '**/.gitignore'
    - '.handoff-import'
    - '.playwright-mcp'
    - '.github/PULL_REQUEST_TEMPLATE'
    - '**/*.prof'
    - '**/baseline.txt'

  comment: on-failure # on what condition license-eye will comment on the pull request, `on-failure`, `always`, `never`.

dependency:
  files:
    - go.mod
