# This docker-compose file demonstrates how to use BanyanDB as the storage
# backend for SkyWalking OAP. It includes:
# - BanyanDB standalone instance with data persistence
# - SkyWalking OAP server with BanyanDB storage
# - SkyWalking UI
# - Demo services (agent, provider, consumer) for generating trace traffic
#
# For VM metrics collection, add an OTEL collector or use node_exporter.
# See: https://skywalking.apache.org/docs/main/next/en/setup/backend/backend-storage/
#
# Usage:
#   docker compose up -d
#
# To use different versions, override the image tags:
#   BANYANDB_IMAGE=apache/skywalking-banyandb:0.9.0 \
#   OAP_IMAGE=apache/skywalking-oap-server:10.3.0 \
#   OAP_UI_IMAGE=apache/skywalking-ui:10.3.0 \
#   docker compose up -d

services:
  banyandb:
    image: ${BANYANDB_IMAGE:-apache/skywalking-banyandb:0.9.0}
    container_name: banyandb
    command: standalone
    expose:
      - 17912
    ports:
      - 17913:17913  # HTTP port for bydbctl and embedded UI
      - 6060:6060    # pprof/debug endpoint
      - 2121:2121    # observability/metrics endpoint
    volumes:
      - banyandb-data:/tmp/banyanDB
    networks:
      - demo
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/17913"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 30s

  oap:
    image: ${OAP_IMAGE:-apache/skywalking-oap-server:10.3.0}
    container_name: skywalking-oap
    environment:
      # Storage configuration - use BanyanDB as the backend
      SW_STORAGE: banyandb
      SW_STORAGE_BANYANDB_TARGETS: banyandb:17912

      # Enable VM metrics collection via OpenTelemetry
      # These settings enable the OTel receiver and VM metrics rules
      SW_OTEL_RECEIVER: default
      SW_OTEL_RECEIVER_ENABLED_OC_RULES: vm
      SW_OTEL_RECEIVER_ENABLED_OTEL_METRICS_RULES: vm

      # Telemetry and performance settings
      SW_TELEMETRY: prometheus
      SW_CORE_RECORD_DATA_TTL: 7
      SW_CORE_METRICS_DATA_TTL: 7
      # Optional: Increase max message size for high throughput scenarios.
      # Disabled by default for the quick-start to avoid excessive memory usage.
      # SW_DCS_MAX_INBOUND_MESSAGE_SIZE: 5000000000
    expose:
      - 11800  # gRPC port for agents
      - 12800  # HTTP port for OAP API
      - 9090   # Prometheus metrics
    ports:
      - 12800:12800
      - 11800:11800
    networks:
      - demo
    depends_on:
      banyandb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/12800"]
      interval: 10s
      timeout: 60s
      retries: 30
    restart: unless-stopped

  oap-ui:
    image: ${OAP_UI_IMAGE:-apache/skywalking-ui:10.3.0}
    container_name: skywalking-ui
    ports:
      - 8080:8080
    environment:
      - SW_OAP_ADDRESS=http://oap:12800
    networks:
      - demo
    depends_on:
      oap:
        condition: service_healthy
    restart: unless-stopped

  # Demo services - generates trace traffic automatically
  agent:
    image: ${AGENT_IMAGE:-apache/skywalking-java-agent:9.2.0-java11}
    command: cp -r /skywalking/agent/ /skywalking-java-agent/
    volumes:
      - sw_agent:/skywalking-java-agent
    networks:
      - demo

  provider:
    image: "ghcr.io/apache/skywalking/e2e-service-provider:cc7a2c9e97fd2c421adbe3e9c471688459a446d9"
    volumes:
      - sw_agent:/sw-java-agent
    environment:
      JAVA_TOOL_OPTIONS: -javaagent:/sw-java-agent/agent/skywalking-agent.jar
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: oap:11800
      SW_LOGGING_OUTPUT: CONSOLE
      SW_AGENT_NAME: service-provider
      SW_AGENT_INSTANCE_NAME: provider1
      SW_AGENT_COLLECTOR_GET_PROFILE_TASK_INTERVAL: 1
      SW_AGENT_COLLECTOR_GET_AGENT_DYNAMIC_CONFIG_INTERVAL: 1
    ports:
      - 9090
    networks:
      - demo
    depends_on:
      oap:
        condition: service_healthy
      agent:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/9090" ]
      interval: 5s
      timeout: 60s
      retries: 120

  consumer:
    image: "ghcr.io/apache/skywalking/e2e-service-consumer:cc7a2c9e97fd2c421adbe3e9c471688459a446d9"
    volumes:
      - sw_agent:/sw-java-agent
    environment:
      JAVA_TOOL_OPTIONS: -javaagent:/sw-java-agent/agent/skywalking-agent.jar
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: oap:11800
      SW_LOGGING_OUTPUT: CONSOLE
      PROVIDER_URL: http://provider:9090
      SW_AGENT_NAME: service-consumer
      SW_AGENT_INSTANCE_NAME: consumer1
      SW_AGENT_COLLECTOR_GET_PROFILE_TASK_INTERVAL: 1
      SW_AGENT_COLLECTOR_GET_AGENT_DYNAMIC_CONFIG_INTERVAL: 1
    ports:
      - 9092
    networks:
      - demo
    depends_on:
      oap:
        condition: service_healthy
      provider:
        condition: service_healthy
      agent:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/9092" ]
      interval: 5s
      timeout: 60s
      retries: 120

  traffic_loader:
    image: curlimages/curl
    networks:
      - demo
    depends_on:
      oap:
        condition: service_healthy
      provider:
        condition: service_healthy
      consumer:
        condition: service_healthy
    entrypoint: >
      sh -c "
      echo 'Starting traffic generation...';
      while true; do
        curl -X POST http://consumer:9092/info;
        sleep 1;
      done
      "

networks:
  demo:

volumes:
  banyandb-data:
    driver: local
  sw_agent: {}
