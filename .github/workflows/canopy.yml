name: Canopy

on:
  push:
    paths:
      - 'canopy/**'
      - '.github/workflows/canopy.yml'
  pull_request:
    paths:
      - 'canopy/**'
      - '.github/workflows/canopy.yml'

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: canopy

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.6.0'
          cache: 'npm'
          cache-dependency-path: canopy/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Typecheck (shared)
        run: npm run -w shared typecheck

      - name: Typecheck (web)
        run: npm run -w web typecheck

      - name: Typecheck (server)
        run: npm run -w server typecheck

      - name: Lint (web)
        run: npm run -w web lint

      - name: Lint (server)
        run: npm run -w server lint

      - name: Test (server — unit + contract)
        run: npm run -w server test

      - name: Build (web)
        run: npm run -w web build

      - name: Build (server)
        run: npm run -w server build

      - name: Verify CSS preserves :has() and color-mix()
        run: |
          grep -r "has(" web/dist/assets/*.css && echo "✓ :has() preserved in built CSS"
          grep -r "color-mix(" web/dist/assets/*.css && echo "✓ color-mix() preserved in built CSS"

      - name: Check ui/ guardrail (must be empty)
        working-directory: ${{ github.workspace }}
        run: |
          CHANGES=$(git status --short -- ui/ ui/embed.go)
          if [ -n "$CHANGES" ]; then
            echo "ERROR: ui/ was modified — this is forbidden"
            echo "$CHANGES"
            exit 1
          fi
          echo "✓ ui/ untouched"

  # ── Required-check shims for canopy-only PRs ────────────────────────────────
  # Branch protection requires the Go pipeline's aggregate checks ("Continuous
  # Integration" from ci.yml and "push-banyandb-image" from publish-docker.yml).
  # Those workflows are `paths-ignore: canopy/**`, so on a canopy-only PR they
  # never run and GitHub parks the required checks as "Expected", blocking merge
  # even though the change touches no Go code. canopy.yml is the workflow that DOES
  # run for canopy-only changes (and is itself ignored by ci.yml/publish-docker.yml),
  # so report the same check contexts here as trivially-successful placeholders —
  # GitHub's documented pattern for required checks behind path filters. A PR that
  # also touches Go code triggers the real workflows, which report these contexts
  # for real.
  continuous-integration:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - run: echo "Canopy-only change — Go CI (ci.yml) skipped via paths-ignore; required check satisfied."

  push-banyandb-image:
    name: push-banyandb-image
    runs-on: ubuntu-latest
    steps:
      - run: echo "Canopy-only change — docker image build (publish-docker.yml) skipped via paths-ignore; required check satisfied."
