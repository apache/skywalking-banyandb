name: FODC Dashboard Metrics E2E (Kind)

on:
  workflow_call:
    inputs:
      should_run:
        required: false
        type: boolean
        default: true
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'fodc/**'
      - 'banyand/observability/**'
      - 'banyand/queue/**'
      - 'test/e2e-v2/cases/fodc/**'
      - 'docs/operation/grafana-fodc-*.json'
      - '.github/workflows/test-fodc-dashboard-e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  skip:
    if: ${{ github.event_name == 'workflow_call' && !inputs.should_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip FODC Dashboard E2E
        run: echo "Skipping FODC Dashboard E2E because this change does not affect FODC-related paths."

  fodc-dashboard-sync-check:
    if: ${{ github.event_name != 'workflow_call' || inputs.should_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Verify dashboard metrics match test lists
        run: bash test/e2e-v2/cases/fodc/check-dashboard-sync.sh

  fodc-dashboard-kind:
    needs: fodc-dashboard-sync-check
    if: ${{ github.event_name != 'workflow_call' || inputs.should_run }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Load env
        run: grep -v '^#' test/e2e-v2/script/env >> "$GITHUB_ENV"

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          download-artifacts: 'true'
          setup-docker: 'true'

      - name: Build BanyanDB image
        run: |
          make -C banyand release
          make -C banyand docker

      - name: Build FODC agent image
        run: |
          make -C fodc/agent release
          make -C fodc/agent docker

      - name: Build FODC proxy image
        run: |
          make -C fodc/proxy release
          make -C fodc/proxy docker

      - name: List built images
        run: docker image ls | grep -E 'skywalking-banyandb' || true

      - name: Run FODC dashboard-metrics e2e
        uses: apache/skywalking-infra-e2e@ef073adb8b9e148e4eaf3f905fa4e238ee5cc7d6
        with:
          e2e-file: $GITHUB_WORKSPACE/test/e2e-v2/cases/fodc/e2e.yaml
