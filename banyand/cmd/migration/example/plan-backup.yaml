# Sample plan for running `migration copy` against a local backup
# snapshot on a workstation. Adapt every path / date / group / target to
# your own environment before running. Field reference: README.md.
#
# Source mode: `backup` — reads measure + schema-property from a
# downloaded snapshot laid out as
#   <root>/<node>/<date>/{measure,schema-property}/...

staging_dir: /tmp/banyandb-staging

source:
  backup:
    root: /tmp/banyandb-backup
    date: 2026-05-19

groups:
  - sw_metricsMinute
  - sw_metricsHour
  - sw_metricsDay

entries:
  - { stage: hot,  target: /tmp/banyandb-copy/hot/measure-data,  nodes: [hot-0, hot-1]   }
  - { stage: warm, target: /tmp/banyandb-copy/warm/measure-data, nodes: [warn-0, warn-1] }
  - { stage: cold, target: /tmp/banyandb-copy/cold/measure-data, nodes: [cold-0]         }
